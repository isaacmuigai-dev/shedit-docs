<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalTrek | Documentation & Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --citrus-lime: #80CC28;
            --sunset-orange: #F97316;
            --bg-dark: #0A0A0A;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 2rem;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo-placeholder {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--citrus-lime), var(--sunset-orange));
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .links {
            display: grid;
            gap: 1rem;
        }
        .btn {
            padding: 1rem;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
            border-color: var(--citrus-lime);
        }
        .btn-primary {
            background: var(--citrus-lime);
            color: black;
            border: none;
        }
        .btn-primary:hover {
            background: #95ed2f;
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-placeholder">🍎</div>
        <h1>CalTrek</h1>
        <p>Snap. Track. Transform. <br>Your AI-powered weight loss journey.</p>
        
        <div class="links">
            <a href="https://isaacmuigai-dev.github.io/caltrek-docs/privacy_policy.html" class="btn">Privacy Policy</a>
            <a href="https://isaacmuigai-dev.github.io/caltrek-docs/terms_of_service.html" class="btn">Terms of Service</a>
            <a href="https://isaacmuigai-dev.github.io/caltrek-docs/delete_account.html" class="btn">Account Deletion Policy</a>
            <a href="mailto:isaacmuigai.dev@gmail.com" class="btn btn-primary">Contact Support</a>
        </div>
        <p style="font-size: 0.7rem; color: #333; margin-top: 1rem;">Updated: May 04, 2026 - 15:52 UTC</p>
    </div>
    
    <div class="footer">
        &copy; 2026 CalTrek App. All rights reserved.
    </div>
</body>
</html>
